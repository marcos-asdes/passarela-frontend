name: Deploy Web

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage

      - name: Publica % de cobertura no job summary e atualiza dados do badge
        run: node .github/scripts/coverage-summary.mjs

      - name: Sobe relatório HTML de cobertura como artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Commita o badge de cobertura atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.json
          git diff --cached --quiet || git commit -m "chore: atualiza badge de cobertura de testes [skip ci]"
          git push

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_REDUX_PERSIST_ENCRYPTION_KEY=${{ secrets.VITE_REDUX_PERSIST_ENCRYPTION_KEY }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/passarela-web:latest
            ghcr.io/${{ github.repository_owner }}/passarela-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          debug: true
          script: |
            cd /opt/passarela
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d --no-deps web
            docker image prune -f || true
