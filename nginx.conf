server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Nomes de arquivo com hash de conteúdo (build do Vite) — mudam quando o conteúdo muda, cache longo é seguro.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # index.html referencia os assets com hash — sem revalidação, o navegador prende o deploy anterior em cache.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
